<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ft-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="ft-card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="ft-card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#be123c"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="ft-progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <!-- Browser Chrome -->
  <rect width="800" height="450" rx="8" fill="#0f0a12"/>
  <rect width="800" height="32" rx="8" fill="#1a1220"/>
  <rect x="0" y="24" width="800" height="8" fill="#1a1220"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <rect x="200" y="8" width="400" height="18" rx="9" fill="#0f0a12" opacity="0.6"/>
  <text x="400" y="21" text-anchor="middle" fill="#888" font-family="system-ui" font-size="9">fitpulse.app/dashboard</text>

  <!-- Top Nav -->
  <rect x="0" y="32" width="800" height="44" fill="#130e18"/>
  <text x="24" y="59" fill="#fb7185" font-family="system-ui" font-weight="bold" font-size="16">FitPulse</text>
  <text x="150" y="59" fill="#6b7280" font-family="system-ui" font-size="11">Dashboard</text>
  <text x="225" y="59" fill="#6b7280" font-family="system-ui" font-size="11">Workouts</text>
  <text x="300" y="59" fill="#6b7280" font-family="system-ui" font-size="11">Nutrition</text>
  <text x="375" y="59" fill="#6b7280" font-family="system-ui" font-size="11">Progress</text>

  <!-- User -->
  <circle cx="720" cy="54" r="14" fill="#e11d48"/>
  <text x="720" y="58" text-anchor="middle" fill="white" font-family="system-ui" font-size="10">S</text>
  <text x="680" y="58" fill="#d1d5db" font-family="system-ui" font-size="10">Sarah</text>

  <!-- Main Content -->
  <!-- Welcome Banner -->
  <rect x="20" y="84" width="760" height="64" rx="10" fill="url(#ft-card1)"/>
  <text x="36" y="110" fill="white" font-family="system-ui" font-size="16" font-weight="bold">Good Morning, Sarah!</text>
  <text x="36" y="130" fill="#fecdd3" font-family="system-ui" font-size="11">You're 68% through your weekly goal. Keep going!</text>
  <!-- Progress bar -->
  <rect x="500" y="106" width="260" height="8" rx="4" fill="#881337"/>
  <rect x="500" y="106" width="177" height="8" rx="4" fill="url(#ft-progress)"/>
  <text x="688" y="104" fill="#fecdd3" font-family="system-ui" font-size="10">68%</text>

  <!-- Stats Row -->
  <rect x="20" y="158" width="180" height="80" rx="8" fill="#1a1220"/>
  <text x="36" y="180" fill="#6b7280" font-family="system-ui" font-size="10">Calories Burned</text>
  <text x="36" y="206" fill="#fda4af" font-family="system-ui" font-size="24" font-weight="bold">2,847</text>
  <text x="120" y="206" fill="#22c55e" font-family="system-ui" font-size="9">kcal</text>
  <!-- Mini ring -->
  <circle cx="174" cy="194" r="16" fill="none" stroke="#2d1520" stroke-width="4"/>
  <circle cx="174" cy="194" r="16" fill="none" stroke="#e11d48" stroke-width="4" stroke-dasharray="75 100" stroke-dashoffset="0" transform="rotate(-90 174 194)"/>

  <rect x="210" y="158" width="180" height="80" rx="8" fill="#1a1220"/>
  <text x="226" y="180" fill="#6b7280" font-family="system-ui" font-size="10">Steps</text>
  <text x="226" y="206" fill="#fda4af" font-family="system-ui" font-size="24" font-weight="bold">8,432</text>
  <text x="310" y="206" fill="#6b7280" font-family="system-ui" font-size="9">/10,000</text>
  <circle cx="364" cy="194" r="16" fill="none" stroke="#2d1520" stroke-width="4"/>
  <circle cx="364" cy="194" r="16" fill="none" stroke="#f472b6" stroke-width="4" stroke-dasharray="84 100" stroke-dashoffset="0" transform="rotate(-90 364 194)"/>

  <rect x="400" y="158" width="180" height="80" rx="8" fill="#1a1220"/>
  <text x="416" y="180" fill="#6b7280" font-family="system-ui" font-size="10">Active Minutes</text>
  <text x="416" y="206" fill="#fda4af" font-family="system-ui" font-size="24" font-weight="bold">45</text>
  <text x="456" y="206" fill="#6b7280" font-family="system-ui" font-size="9">/60 min</text>
  <circle cx="554" cy="194" r="16" fill="none" stroke="#2d1520" stroke-width="4"/>
  <circle cx="554" cy="194" r="16" fill="none" stroke="#fb7185" stroke-width="4" stroke-dasharray="75 100" stroke-dashoffset="0" transform="rotate(-90 554 194)"/>

  <rect x="590" y="158" width="190" height="80" rx="8" fill="#1a1220"/>
  <text x="606" y="180" fill="#6b7280" font-family="system-ui" font-size="10">Heart Rate</text>
  <text x="606" y="206" fill="#fda4af" font-family="system-ui" font-size="24" font-weight="bold">72</text>
  <text x="638" y="206" fill="#e11d48" font-family="system-ui" font-size="9">bpm</text>
  <!-- Heartbeat line -->
  <polyline points="700,200 710,200 714,188 718,212 722,194 726,200 740,200 744,186 748,210 752,196 760,200 770,200" fill="none" stroke="#e11d48" stroke-width="1.5"/>

  <!-- Weekly Chart -->
  <rect x="20" y="248" width="470" height="192" rx="8" fill="#1a1220"/>
  <text x="36" y="272" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">Weekly Activity</text>
  <rect x="390" y="260" width="40" height="16" rx="8" fill="#e11d48" opacity="0.2"/>
  <text x="410" y="272" text-anchor="middle" fill="#fb7185" font-family="system-ui" font-size="8">This Week</text>
  <rect x="436" y="260" width="40" height="16" rx="8" fill="#2d1520"/>
  <text x="456" y="272" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Last</text>

  <!-- Bar Chart -->
  <!-- Mon -->
  <rect x="56" y="330" width="30" height="90" rx="4" fill="#2d1520"/>
  <rect x="56" y="360" width="30" height="60" rx="4" fill="url(#ft-accent)"/>
  <text x="71" y="432" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Mon</text>
  <!-- Tue -->
  <rect x="106" y="310" width="30" height="110" rx="4" fill="#2d1520"/>
  <rect x="106" y="340" width="30" height="80" rx="4" fill="url(#ft-accent)"/>
  <text x="121" y="432" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Tue</text>
  <!-- Wed -->
  <rect x="156" y="340" width="30" height="80" rx="4" fill="#2d1520"/>
  <rect x="156" y="380" width="30" height="40" rx="4" fill="url(#ft-accent)"/>
  <text x="171" y="432" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Wed</text>
  <!-- Thu -->
  <rect x="206" y="300" width="30" height="120" rx="4" fill="#2d1520"/>
  <rect x="206" y="320" width="30" height="100" rx="4" fill="url(#ft-accent)"/>
  <text x="221" y="432" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Thu</text>
  <!-- Fri -->
  <rect x="256" y="320" width="30" height="100" rx="4" fill="#2d1520"/>
  <rect x="256" y="350" width="30" height="70" rx="4" fill="url(#ft-accent)"/>
  <text x="271" y="432" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Fri</text>
  <!-- Sat -->
  <rect x="306" y="290" width="30" height="130" rx="4" fill="#2d1520"/>
  <rect x="306" y="310" width="30" height="110" rx="4" fill="url(#ft-accent)"/>
  <text x="321" y="432" text-anchor="middle" fill="#fb7185" font-family="system-ui" font-size="8" font-weight="bold">Sat</text>
  <!-- Sun -->
  <rect x="356" y="350" width="30" height="70" rx="4" fill="#2d1520"/>
  <rect x="356" y="390" width="30" height="30" rx="4" fill="#e11d48" opacity="0.3"/>
  <text x="371" y="432" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Sun</text>

  <!-- Y-axis -->
  <text x="36" y="336" fill="#4a4a5a" font-family="system-ui" font-size="8">60</text>
  <text x="36" y="366" fill="#4a4a5a" font-family="system-ui" font-size="8">40</text>
  <text x="36" y="396" fill="#4a4a5a" font-family="system-ui" font-size="8">20</text>

  <!-- Workout Cards -->
  <rect x="500" y="248" width="280" height="192" rx="8" fill="#1a1220"/>
  <text x="516" y="272" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">Today's Workouts</text>

  <!-- Workout 1 -->
  <rect x="508" y="284" width="264" height="50" rx="6" fill="#2d1520"/>
  <rect x="516" y="292" width="34" height="34" rx="8" fill="#e11d48" opacity="0.2"/>
  <text x="533" y="314" text-anchor="middle" fill="#fb7185" font-family="system-ui" font-size="14">🏃</text>
  <text x="560" y="305" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="600">Morning Run</text>
  <text x="560" y="320" fill="#6b7280" font-family="system-ui" font-size="9">5.2 km - 28 min</text>
  <rect x="720" y="298" width="44" height="18" rx="9" fill="#22c55e" opacity="0.2"/>
  <text x="742" y="310" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="8">Done</text>

  <!-- Workout 2 -->
  <rect x="508" y="340" width="264" height="50" rx="6" fill="#2d1520"/>
  <rect x="516" y="348" width="34" height="34" rx="8" fill="#e11d48" opacity="0.2"/>
  <text x="533" y="370" text-anchor="middle" fill="#fb7185" font-family="system-ui" font-size="14">💪</text>
  <text x="560" y="361" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="600">Upper Body</text>
  <text x="560" y="376" fill="#6b7280" font-family="system-ui" font-size="9">45 min - Strength</text>
  <rect x="720" y="354" width="44" height="18" rx="9" fill="#f59e0b" opacity="0.2"/>
  <text x="742" y="366" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="8">Next</text>

  <!-- Workout 3 -->
  <rect x="508" y="396" width="264" height="38" rx="6" fill="#2d1520"/>
  <rect x="516" y="402" width="26" height="26" rx="6" fill="#e11d48" opacity="0.2"/>
  <text x="529" y="420" text-anchor="middle" fill="#fb7185" font-family="system-ui" font-size="11">🧘</text>
  <text x="550" y="417" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="600">Evening Yoga</text>
  <text x="650" y="417" fill="#6b7280" font-family="system-ui" font-size="9">30 min</text>
  <rect x="720" y="406" width="44" height="18" rx="9" fill="#6b7280" opacity="0.2"/>
  <text x="742" y="418" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="8">Later</text>
</svg>