<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="pf-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="pf-img1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a1942"/>
      <stop offset="100%" stop-color="#2d1b3d"/>
    </linearGradient>
    <linearGradient id="pf-img2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d1f3d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Browser Chrome -->
  <rect width="800" height="450" rx="8" fill="#0f0f17"/>
  <rect width="800" height="32" rx="8" fill="#1e1e2e"/>
  <rect x="0" y="24" width="800" height="8" fill="#1e1e2e"/>
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <rect x="200" y="8" width="400" height="18" rx="9" fill="#0f0f17" opacity="0.6"/>
  <text x="400" y="21" text-anchor="middle" fill="#888" font-family="system-ui" font-size="9">sarahlens.photography</text>

  <!-- Top Navigation -->
  <rect x="0" y="32" width="800" height="50" fill="#0f0f17"/>
  <text x="40" y="63" fill="#fda4af" font-family="system-ui" font-weight="bold" font-size="18" letter-spacing="2">SARAH LENS</text>
  <text x="380" y="62" fill="#999" font-family="system-ui" font-size="11">Portfolio</text>
  <text x="450" y="62" fill="#999" font-family="system-ui" font-size="11">About</text>
  <text x="510" y="62" fill="#999" font-family="system-ui" font-size="11">Services</text>
  <text x="580" y="62" fill="#999" font-family="system-ui" font-size="11">Journal</text>
  <rect x="660" y="49" width="100" height="28" rx="14" fill="url(#pf-accent)"/>
  <text x="710" y="67" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600">Contact</text>

  <!-- Filter Tabs -->
  <rect x="0" y="82" width="800" height="36" fill="#13131f"/>
  <rect x="180" y="88" width="60" height="24" rx="12" fill="#e11d48"/>
  <text x="210" y="104" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" font-weight="600">All</text>
  <rect x="250" y="88" width="80" height="24" rx="12" fill="#1e1e2e"/>
  <text x="290" y="104" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Portraits</text>
  <rect x="340" y="88" width="80" height="24" rx="12" fill="#1e1e2e"/>
  <text x="380" y="104" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Landscape</text>
  <rect x="430" y="88" width="80" height="24" rx="12" fill="#1e1e2e"/>
  <text x="470" y="104" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Wedding</text>
  <rect x="520" y="88" width="80" height="24" rx="12" fill="#1e1e2e"/>
  <text x="560" y="104" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Street</text>

  <!-- Photo Grid - Masonry Style -->
  <!-- Row 1 -->
  <rect x="24" y="126" width="240" height="150" rx="6" fill="#2a1528"/>
  <!-- Mountain silhouette -->
  <polygon points="24,276 90,180 130,220 180,160 264,276" fill="#3d1b3d" opacity="0.6"/>
  <circle cx="220" cy="156" r="16" fill="#f472b6" opacity="0.2"/>
  <rect x="36" y="248" width="80" height="8" rx="4" fill="#fda4af" opacity="0.3"/>
  <text x="36" y="270" fill="#888" font-family="system-ui" font-size="8">Golden Hour</text>

  <rect x="272" y="126" width="256" height="150" rx="6" fill="#1e1428"/>
  <!-- Abstract shapes for portrait -->
  <circle cx="400" cy="185" r="30" fill="#4a1942" opacity="0.5"/>
  <rect x="380" y="220" width="40" height="35" rx="4" fill="#3d1f3d" opacity="0.4"/>
  <rect x="284" y="248" width="100" height="8" rx="4" fill="#fda4af" opacity="0.3"/>
  <text x="284" y="270" fill="#888" font-family="system-ui" font-size="8">Portrait Series</text>

  <rect x="536" y="126" width="240" height="150" rx="6" fill="#241828"/>
  <polygon points="536,276 600,190 650,230 720,170 776,276" fill="#4a1942" opacity="0.4"/>
  <rect x="548" y="248" width="90" height="8" rx="4" fill="#fda4af" opacity="0.3"/>
  <text x="548" y="270" fill="#888" font-family="system-ui" font-size="8">Urban Nights</text>

  <!-- Row 2 -->
  <rect x="24" y="284" width="180" height="155" rx="6" fill="#1e1428"/>
  <circle cx="114" cy="340" r="35" fill="#3d1b3d" opacity="0.4"/>
  <circle cx="114" cy="340" r="20" fill="#4a1942" opacity="0.3"/>
  <rect x="36" y="410" width="70" height="7" rx="3" fill="#fda4af" opacity="0.3"/>
  <text x="36" y="430" fill="#888" font-family="system-ui" font-size="8">Macro World</text>

  <rect x="212" y="284" width="200" height="155" rx="6" fill="#281428"/>
  <rect x="240" y="310" width="60" height="80" rx="3" fill="#3d1b3d" opacity="0.4"/>
  <rect x="310" y="320" width="60" height="60" rx="3" fill="#4a1942" opacity="0.3"/>
  <rect x="224" y="410" width="85" height="7" rx="3" fill="#fda4af" opacity="0.3"/>
  <text x="224" y="430" fill="#888" font-family="system-ui" font-size="8">Architecture</text>

  <rect x="420" y="284" width="175" height="155" rx="6" fill="#241828"/>
  <polygon points="420,439 470,320 520,370 595,300 595,439" fill="#3d1f3d" opacity="0.4"/>
  <rect x="432" y="410" width="80" height="7" rx="3" fill="#fda4af" opacity="0.3"/>
  <text x="432" y="430" fill="#888" font-family="system-ui" font-size="8">Wilderness</text>

  <rect x="603" y="284" width="173" height="155" rx="6" fill="#1e1428"/>
  <circle cx="690" cy="345" r="28" fill="#4a1942" opacity="0.4"/>
  <rect x="665" y="375" width="50" height="25" rx="3" fill="#3d1b3d" opacity="0.3"/>
  <rect x="615" y="410" width="75" height="7" rx="3" fill="#fda4af" opacity="0.3"/>
  <text x="615" y="430" fill="#888" font-family="system-ui" font-size="8">Still Life</text>

  <!-- Hover overlay example on first image -->
  <rect x="24" y="126" width="240" height="150" rx="6" fill="#e11d48" opacity="0.08"/>
</svg>